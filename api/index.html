<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Instagram Control API</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; display: flex; justify-content: center; padding: 50px; }
        .box { background: white; border: 1px solid #dbdbdb; padding: 30px; border-radius: 8px; width: 350px; }
        .tab { display: flex; margin-bottom: 20px; }
        .tab button { flex: 1; padding: 10px; cursor: pointer; border: 1px solid #dbdbdb; }
        .active { background: #0095f6; color: white; border: none; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #dbdbdb; border-radius: 4px; box-sizing: border-box; }
        button#submit { width: 100%; padding: 12px; background: #0095f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align:center">Insta API Panel</h2>
        <div class="tab">
            <button id="anonBtn" class="active" onclick="setMode('anon')">Anonim (Bot)</button>
            <button id="userBtn" onclick="setMode('user')">Kendi Hesabım</button>
        </div>

        <div id="loginFields" class="hidden">
            <input type="text" id="myUser" placeholder="Kullanıcı Adın">
            <input type="password" id="myPass" placeholder="Şifren">
        </div>

        <select id="action" onchange="toggleMsg()">
            <option value="follow">Takip Et</option>
            <option value="unfollow">Takipten Çık</option>
            <option value="message">Mesaj Gönder</option>
        </select>

        <input type="text" id="target" placeholder="Hedef @kullanici">
        <input type="text" id="msgText" class="hidden" placeholder="Mesajınız...">
        
        <button id="submit" onclick="run()">İşlemi Çalıştır</button>
    </div>

    <script>
        let mode = 'anon';
        function setMode(m) {
            mode = m;
            document.getElementById('anonBtn').className = m === 'anon' ? 'active' : '';
            document.getElementById('userBtn').className = m === 'user' ? 'active' : '';
            document.getElementById('loginFields').className = m === 'user' ? '' : 'hidden';
        }
        function toggleMsg() {
            const isMsg = document.getElementById('action').value === 'message';
            document.getElementById('msgText').className = isMsg ? '' : 'hidden';
        }

        async function run() {
            const btn = document.getElementById('submit');
            btn.innerText = "İşleniyor...";
            
            const payload = {
                mode: mode,
                username: document.getElementById('myUser').value,
                password: document.getElementById('myPass').value,
                action: document.getElementById('action').value,
                target: document.getElementById('target').value,
                messageText: document.getElementById('msgText').value
            };

            const response = await fetch('/api', {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            alert(result.message);
            btn.innerText = "İşlemi Çalıştır";
        }
    </script>
</body>
          </html>
