<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaControl Panel</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; border: 1px solid #dbdbdb; padding: 25px; border-radius: 8px; width: 100%; max-width: 350px; }
        .tabs { display: flex; margin-bottom: 20px; border-radius: 5px; overflow: hidden; }
        .tabs button { flex: 1; padding: 10px; border: 1px solid #dbdbdb; background: #efefef; cursor: pointer; }
        .tabs button.active { background: #0095f6; color: white; border: none; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 4px; box-sizing: border-box; }
        #submit { width: 100%; padding: 14px; background: #0095f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        #status { margin-top: 15px; padding: 10px; border-radius: 4px; text-align: center; word-wrap: break-word; font-size: 13px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="text-align:center">Insta API Control</h3>
    <div class="tabs">
        <button id="b1" class="active" onclick="setMode('anon')">Anonim</button>
        <button id="b2" onclick="setMode('user')">Kendi Hesabım</button>
    </div>

    <div id="uFields" class="hidden">
        <input type="text" id="u" placeholder="Kullanıcı Adın">
        <input type="password" id="p" placeholder="Şifren">
    </div>

    <select id="act" onchange="toggleMsg()">
        <option value="follow">Takip Et</option>
        <option value="unfollow">Takipten Çık</option>
        <option value="message">DM Gönder</option>
    </select>

    <input type="text" id="target" placeholder="Hedef @kullanici">
    <input type="text" id="msg" class="hidden" placeholder="Mesaj içeriği...">

    <button id="submit" onclick="run()">İşlemi Başlat</button>
    <div id="status" class="hidden"></div>
</div>

<script>
    let mode = 'anon';
    function setMode(m) {
        mode = m;
        document.getElementById('b1').className = m === 'anon' ? 'active' : '';
        document.getElementById('b2').className = m === 'user' ? 'active' : '';
        document.getElementById('uFields').className = m === 'user' ? '' : 'hidden';
    }
    function toggleMsg() {
        document.getElementById('msg').className = document.getElementById('act').value === 'message' ? '' : 'hidden';
    }

    async function run() {
        const s = document.getElementById('status');
        const b = document.getElementById('submit');
        b.innerText = "Bekleyiniz...";
        b.disabled = true;
        s.className = 'hidden';

        try {
            const r = await fetch('/api/main', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    mode: mode,
                    username: document.getElementById('u').value,
                    password: document.getElementById('p').value,
                    action: document.getElementById('act').value,
                    target: document.getElementById('target').value,
                    messageText: document.getElementById('msg').value
                })
            });
            const res = await r.json();
            s.innerText = res.message;
            s.className = r.ok ? 'success' : 'error';
        } catch (e) {
            s.innerText = "Hata: Sunucuya ulaşılamadı.";
            s.className = 'error';
        } finally {
            s.classList.remove('hidden');
            b.innerText = "İşlemi Başlat";
            b.disabled = false;
        }
    }
</script>
</body>
</html>
