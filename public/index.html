<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta API Pro</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; border: 1px solid #dbdbdb; padding: 20px; border-radius: 8px; width: 100%; max-width: 350px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 4px; border: 1px solid #dbdbdb; box-sizing: border-box; }
        button { background: #0095f6; color: white; font-weight: bold; cursor: pointer; border: none; }
        .hidden { display: none; }
        #status { margin-top: 10px; padding: 10px; font-size: 13px; text-align: center; border-radius: 4px; }
        .challenge { background: #fff9c4; color: #827717; border: 1px solid #fbc02d; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
<div class="card">
    <h3 style="text-align:center">Insta Control v2</h3>
    <select id="mode" onchange="document.getElementById('uFields').classList.toggle('hidden', this.value=='anon')">
        <option value="anon">Anonim Mod (Bot)</option>
        <option value="user">Kendi Hesabım</option>
    </select>
    <div id="uFields" class="hidden">
        <input type="text" id="u" placeholder="Kullanıcı Adı">
        <input type="password" id="p" placeholder="Şifre">
    </div>
    <select id="act"><option value="follow">Takip Et</option><option value="message">Mesaj Gönder</option></select>
    <input type="text" id="target" placeholder="Hedef @kullanici">
    <input type="text" id="msg" placeholder="Mesaj (varsa)">
    
    <div id="challengeArea" class="hidden">
        <p style="font-size:12px; color:red;">Instagram doğrulama kodu istedi:</p>
        <input type="text" id="vCode" placeholder="6 Haneli Kod">
    </div>

    <button id="btn" onclick="run()">İşlemi Başlat</button>
    <div id="status" class="hidden"></div>
</div>

<script>
    async function run() {
        const s = document.getElementById('status');
        const b = document.getElementById('btn');
        b.innerText = "İşleniyor...";
        s.className = 'hidden';

        const data = {
            mode: document.getElementById('mode').value,
            username: document.getElementById('u').value,
            password: document.getElementById('p').value,
            action: document.getElementById('act').value,
            target: document.getElementById('target').value,
            messageText: document.getElementById('msg').value,
            verificationCode: document.getElementById('vCode').value
        };

        try {
            const r = await fetch('/api/main', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const res = await r.json();
            
            if (res.status === "challenge") {
                document.getElementById('challengeArea').classList.remove('hidden');
                s.className = 'status challenge';
            } else {
                s.className = r.ok ? 'status success' : 'status error';
            }
            s.innerText = res.message;
        } catch (e) {
            s.innerText = "Hata oluştu!";
            s.className = 'status error';
        } finally {
            s.classList.remove('hidden');
            b.innerText = "İşlemi Başlat";
        }
    }
</script>
</body>
</html>
