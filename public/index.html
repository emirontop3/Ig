<script>
    async function executeAction() {
        const btn = document.getElementById('submit-btn');
        const statusDiv = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerText = "İşleniyor...";
        statusDiv.classList.add('hidden');

        const payload = {
            mode: currentMode,
            username: document.getElementById('my-username').value,
            password: document.getElementById('my-password').value,
            action: document.getElementById('action-select').value,
            target: document.getElementById('target-user').value,
            messageText: document.getElementById('dm-text').value
        };

        try {
            const response = await fetch('/api/main', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            
            if (!response.ok) {
                // Backend'den gelen spesifik hata mesajını göster
                throw new Error(result.message || "Bilinmeyen bir hata oluştu.");
            }

            statusDiv.innerText = result.message;
            statusDiv.className = 'success';
        } catch (err) {
            // "Sunucu hatası" yerine gerçek hatayı yazdırır (örn: "Login failed")
            statusDiv.innerText = "Hata: " + err.message;
            statusDiv.className = 'error';
        } finally {
            statusDiv.classList.remove('hidden');
            btn.disabled = false;
            btn.innerText = "İşlemi Başlat";
        }
    }
</script>
