<!DOCTYPE html>
<html>
<head>
    <title>Emirattaa Bot Panel</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 50px; }
        input { padding: 10px; background: #111; border: 1px solid #0f0; color: #0f0; width: 250px; }
        button { padding: 10px 20px; background: #0f0; color: #000; border: none; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; color: #aaa; }
    </style>
</head>
<body>
    <h2>INSTA-SHADOW v2</h2>
    <input type="text" id="target" placeholder="@hedef_kullanici">
    <button onclick="send()">TAKİP ET</button>
    <div id="status"></div>

    <script>
        async function send() {
            const status = document.getElementById('status');
            status.innerText = "Operasyon başlatıldı...";
            try {
                const r = await fetch('/follow', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ target: document.getElementById('target').value })
                });
                const res = await r.json();
                status.innerText = res.mesaj;
            } catch (e) {
                status.innerText = "HATA: Sunucuya bağlanılamadı.";
            }
        }
    </script>
</body>
</html>
